api:
- apiName: "分页获取区域列表"
  description: "根据输入分页参数和树编码treeCode，分页返回对应树的所有区域。其中treeCode可通过#API@获取所有树编码@#获取，treeCode为\
    0代表国标树。"
  apiGroupInfo:
    groupId: 1786987346239946752
  apiProviderInfo:
    pId: 13
  protocol: "HTTPS"
  path: "/api/resource/v1/regions"
  httpMethod: "POST"
  authenticationMode: "1"
  backendServiceType: "HTTPS"
  backendurl: "/univice/application/catalog/v1/device/region/regionList"
  backendHttpMethod: "POST"
  backendTimeout: 10000
  inParms:
  - oder: 0
    paramName: "userId"
    paramPos: "Head"
    paramType: "String"
    nullable: true
    defaultValue: "#userId#"
    demo: "admin"
    description: "内部系统的用户id"
    backendParam:
      beParmName: "userId"
      beParmPos: "Head"
  - paramName: "body"
    paramPos: "Body"
    paramType: "application/json"
    nullable: true
    model:
      name: "Object"
      type: "Object"
      required: true
      example: " "
      hidden: false
      children:
      - name: "pageNo"
        type: "Number"
        required: true
        example: " 1"
        description: "指定第几页，从1开始"
        hidden: false
        mappingName: "pageNo"
      - name: "pageSize"
        type: "Number"
        required: true
        example: "20"
        description: "每页返回的条数"
        hidden: false
        mappingName: "pageSize"
      - name: "treeCode"
        type: "String"
        required: false
        example: "0"
        description: "树编号（默认0：国标树）,可通过#API@获取所有树编码@#获取"
        hidden: false
        mappingName: "treeCode"
    demo: "{\n    \"pageNo\": 1,\n    \"pageSize\": 20,\n    \"treeCode\": \"0\"\n\
      }"
    backendParam:
      beParmName: "body"
      beParmPos: "Body"
  beConsts: []
  sysParms: []
  response:
    resType: "application/json"
    resDemo: "{\n    \"code\": \"0\",\n    \"msg\": \"success\",\n    \"data\": {\n\
      \        \"total\": 1,\n        \"pageSize\": 20,\n        \"pageNo\": 1,\n\
      \        \"list\": [\n            {\n                \"indexCode\": \"083b2031c1db4f368f015fe2562e0012\"\
      ,\n                \"name\": \"全国\",\n                \"parentIndexCode\": \"\
      -1\",\n                \"treeCode\": \"0\",\n                \"externalIndexCode\"\
      : \"3301001\"\n            }\n        ]\n    }\n}"
    model:
      name: "Object"
      type: "Object"
      required: true
      example: ""
      description: ""
      hidden: false
      children:
      - name: "code"
        type: "String"
        required: false
        example: "0"
        description: "返回码（0表示成功，其他表示失败）"
        hidden: false
        mappingName: "code"
      - name: "msg"
        type: "String"
        required: false
        example: "success"
        description: "返回信息"
        hidden: false
        mappingName: "msg"
      - name: "data"
        type: "Object"
        required: false
        example: ""
        description: "返回数据"
        hidden: false
        mappingName: "data"
        children:
        - name: "total"
          type: "Number"
          required: false
          example: "1"
          description: "总条数"
          hidden: false
          mappingName: "total"
        - name: "pageSize"
          type: "Number"
          required: false
          example: "20"
          description: "当前分页记录数"
