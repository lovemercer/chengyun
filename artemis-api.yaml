        description: "开始查询时间（ISO8601格式yyyy-MM-dd'T'HH:mm:ss.SSSXXX）"
        hidden: false
        mappingName: "beginTime"
        mappingPosition: "Body"
      - name: "endTime"
        type: "String"
        required: true
        example: "2021-06-18T00:00:00.000+08:00"
        description: "结束查询时间（ISO8601格式yyyy-MM-dd'T'HH:mm:ss.SSSXXX）"
        hidden: false
        mappingName: "endTime"
        mappingPosition: "Body"
      - name: "recordLocation"
        type: "String"
        required: false
        example: "0"
        description: "录像存储位置（1-中心存储，0-设备存储）,默认设备存储"
        hidden: false
        mappingName: "recordStyle"
        mappingPosition: "Body"
      - name: "protocol"
        type: "String"
        required: false
        example: "rtsp"
        description: "取流协议（应用层协议)，\n“rtsp”:RTSP协议（标准rtsp协议常用于如开源工具vlc取流播放，非标rtsp协议\
          一般用于对接海康sdk。标准rtsp协议与非标rtsp协议如何指定请参考expand字段。）；\n“rtmp”:RTMP协议（RTMP回放要求录\
          像片段连续，需要在URL后自行拼接beginTime=20210902T100303&endTime=20210902T100400，其中20210902T100303至\
          20210902T100400为查询出有连续录像的时间段。对于不连续的录像，需要分段查询分段播放）；\n“hls”:HLS协议（一般用于H5页面\
          取流播放，HLS协议只支持海康SDK协议、EHOME协议、ONVIF协议接入的设备；只支持H264视频编码和AAC音频编码；hls协议只支持云存\
          储，不支持设备存储，云存储版本要求v2.2.4及以上的2.x版本，或v3.0.5及以上的3.x版本需在运管中心-视频联网共享中切换成启动平台外置\
          VOD）；\n“ws”-Websocket协议（一般用于H5视频播放器取流播放）。\n此字段未指定默认为rtsp协议"
        hidden: false
        mappingName: "protocol"
        mappingPosition: "Body"
      - name: "needReturnClipInfo"
        type: "Boolean"
        required: false
        example: "true"
        description: "是否返回录像片段详细信息（默认false。当需要展示该时间段的录像片段信息时，需要填写true）"
        hidden: false
        mappingName: "needReturnClipInfo"
        mappingPosition: "Body"
      - name: "uuid"
        type: "String"
        required: false
        example: "4750e3a4a5bbad3cda5bbad3cd4af9ed5101"
        description: "上一次查询返回的uuid，用于继续查询剩余片段，默认为空字符串"
        hidden: false
        mappingName: "uuid"
        mappingPosition: "Body"
      - name: "expand"
        type: "String"
        required: false
        example: "transCode=0"
        description: "此字段非必要不建议指定，\n当protocol为rtsp时：\n支持指定streamform=rtp，表示使用标准RTSP协\
