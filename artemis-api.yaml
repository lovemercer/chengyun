          H265编码视频转换成H264编码，典型使用场景如HLS播放。指定transcode=0表示不转码，默认为transcode=0。\n可以同时指\
          定streamform与transcode，但二者必须使用“&”连接起来，如transcode=1&streamform=rtp"
        hidden: false
        mappingName: "expand"
        mappingPosition: "Body"
    demo: "{\n    \"cameraIndexCode\": \"90ad77d8057c43dab140b77361606927\",\n   \
