        mappingName: "msg"
      - name: "data"
        type: "Object"
        required: false
        example: ""
        description: "返回的录像信息（包括播放所需的总rtsp url和录像片段详细信息）"
        hidden: false
        mappingName: "data"
        children:
        - name: "url"
          type: "String"
          required: false
          example: "rtsp://10.2.145.79:554/openUrl/3whQVPi?beginTime=20210615T000000&endTime=20210617T000000&playBackMode=1"
          description: "回放总rtsp url"
